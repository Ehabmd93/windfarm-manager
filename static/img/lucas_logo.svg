<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 58" width="220" height="58">
  <!-- ── Geometric mark: two overlapping angular chevrons ── -->
  <!-- Back chevron, dark green -->
  <polygon points="4,50 18,8 26,8 36,50 29,50 18,18 11,50" fill="#2b6b35"/>
  <!-- Front chevron, medium green, offset right -->
  <polygon points="17,50 31,8 39,8 49,50 42,50 31,18 24,50" fill="#3d9945"/>
  <!-- Small right accent, lighter green -->
  <polygon points="30,50 44,8 50,8 58,50 53,50 44,20 35,50" fill="#4db358" opacity="0.7"/>

  <!-- Divider line between mark and text -->
  <line x1="66" y1="6" x2="66" y2="52" stroke="#d1d5db" stroke-width="1"/>

  <!-- LUCAS wordmark -->
  <text x="74" y="40" font-family="Arial Black, Impact, Helvetica, sans-serif"
        font-size="30" font-weight="900" fill="#1a2332" letter-spacing="2">LUCAS</text>

  <!-- Subtitle -->
  <text x="75" y="52" font-family="Arial, Helvetica, sans-serif"
        font-size="9" font-weight="600" fill="#374151" letter-spacing="1.8">TOTAL CONTRACT SOLUTIONS</text>
</svg>
